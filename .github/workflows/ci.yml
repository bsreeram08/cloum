name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bunx eslint src/ --ext .ts

  # ---------------------------------------------------------------------------
  # Build verification — all platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    needs: [typecheck, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            out: dist/cloum-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            out: dist/cloum-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            out: dist/cloum-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            out: dist/cloum-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.out }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloum-${{ matrix.out }}
          path: ${{ matrix.out }}

  # ---------------------------------------------------------------------------
  # Unit smoke tests (run on every platform)
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke Test (${{ matrix.os }})
    needs: [typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CLI smoke tests
        run: |
          bun run src/index.ts --version
          bun run src/index.ts list
          bun run src/index.ts status
          bun run src/index.ts config --json
          bun run src/index.ts favorites
          bun run src/index.ts sync --status
          bun run src/index.ts --help | grep -q "cloum"

      - name: Verify binary builds
        run: |
          bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile=/tmp/cloum-smoke
          /tmp/cloum-smoke --version
          /tmp/cloum-smoke list
          /tmp/cloum-smoke config --json

  # ---------------------------------------------------------------------------
  # cloum-menu build (macOS only)
  # ---------------------------------------------------------------------------
  menu-build:
    name: Build cloum-menu
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        run: |
          cd cloum-menu
          swift build --configuration release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloum-menu
          path: cloum-menu/.build/release/cloum-menu

  # ---------------------------------------------------------------------------
  # Completeness check — no leftover TODOs in source
  # ---------------------------------------------------------------------------
  no-todos:
    name: No TODO comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TODO/FIXME
        run: |
          ! grep -rn "TODO\|FIXME\|XXX" src/ --include="*.ts" || \
            { echo "Remove TODO/FIXME comments before merging"; exit 1; }

  # ---------------------------------------------------------------------------
  # Security audit
  # ---------------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit dependencies
        run: bun audit --audit-level=high

  # ---------------------------------------------------------------------------
  # JSON schema validation on cluster config types
  # ---------------------------------------------------------------------------
  types:
    name: Types validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate all source loads without errors
        run: |
          bun build ./src/index.ts --target=bun-linux-x64 --outfile=/tmp/cloum-types
          echo "Build successful — all types resolved"
